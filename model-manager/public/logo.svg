<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="100%" stop-color="#9333EA" />
    </linearGradient>
    <radialGradient id="glow-core" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="500" height="500" fill="transparent" />
  <circle cx="250" cy="250" r="210" fill="rgba(15, 23, 42, 0.14)" stroke="url(#grad)" stroke-width="10" />
  <circle cx="250" cy="250" r="130" fill="none" stroke="rgba(255, 255, 255, 0.12)" stroke-width="6" />

  <g transform="translate(250, 250)" filter="url(#glow)">
    <path d="M0 -140 L120 -70 L120 70 L0 140 L-120 70 L-120 -70 Z" fill="none" stroke="url(#grad)" stroke-width="18" />
    <path d="M0 -140 L0 -40 M-120 -70 L-40 0 M120 -70 L40 0 M120 70 L40 0 M-120 70 L-40 0 M0 140 L0 40" stroke="#fff" stroke-width="12" stroke-linecap="round" />
    <circle cx="0" cy="0" r="30" fill="#fff" opacity="0.95" />
    <circle cx="0" cy="0" r="18" fill="url(#glow-core)" />
  </g>

  <circle cx="250" cy="110" r="14" fill="#fff" />
  <circle cx="340" cy="180" r="14" fill="#fff" />
  <circle cx="340" cy="320" r="14" fill="#fff" />
  <circle cx="250" cy="390" r="14" fill="#fff" />
  <circle cx="160" cy="320" r="14" fill="#fff" />
  <circle cx="160" cy="180" r="14" fill="#fff" />
</svg>
